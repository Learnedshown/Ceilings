<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive Collapsible Sidebar with Theme Toggle</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="static/css/style.css">

 
</head>

<body>

<!-- Sidebar -->
<nav id="sidebar">
  <a href="#" class="d-flex align-items-center mb-3 text-decoration-none border-bottom pb-3">
    <i class="bi bi-bootstrap-fill fs-2 me-2 text-primary"></i>
    <span class="fs-4 fw-semibold">Accommo</span>
  </a>

  <ul class="list-unstyled ps-0">
    <li class="mb-1">
      <button class="btn btn-toggle border-0" data-bs-toggle="collapse" data-bs-target="#home-collapse" aria-expanded="true">
        <i class="bi bi-house-door-fill me-2"></i> Home
      </button>
      <div class="collapse show" id="home-collapse">
        <ul class="btn-toggle-nav list-unstyled small">
          <li><a href="#" class="text-decoration-none active-link">Overview</a></li>
          <li><a href="#" class="text-decoration-none">Updates</a></li>
          <li><a href="#" class="text-decoration-none">Reports</a></li>
        </ul>
      </div>
    </li>

    <li class="mb-1">
      <button class="btn btn-toggle border-0 collapsed" data-bs-toggle="collapse" data-bs-target="#dashboard-collapse">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </button>
      <div class="collapse" id="dashboard-collapse">
        <ul class="btn-toggle-nav list-unstyled small">
          <li><a href="#" class="text-decoration-none">Overview</a></li>
          <li><a href="#" class="text-decoration-none">Weekly</a></li>
          <li><a href="#" class="text-decoration-none">Monthly</a></li>
        </ul>
      </div>
    </li>
  </ul>
</nav>

<!-- Overlay -->
<div id="overlay"></div>

<!-- Main -->
<main id="main-content">
  <button class="btn btn-primary d-md-none mb-3" id="sidebarToggle">
    <i class="bi bi-list"></i> Menu
  </button>

  <h1>Welcome!</h1>
  <p>This is your main content area.</p>
</main>

<!-- Theme Toggle -->
<div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle">
  <button class="btn btn-bd-primary dropdown-toggle" data-bs-toggle="dropdown">
    Theme
  </button>
  <ul class="dropdown-menu dropdown-menu-end shadow">
    <li><button class="dropdown-item" data-bs-theme-value="light">Light</button></li>
    <li><button class="dropdown-item" data-bs-theme-value="dark">Dark</button></li>
    <li><button class="dropdown-item" data-bs-theme-value="auto">Auto</button></li>
  </ul>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="static/js/script.js"></script>

</body>
</html>
